name: smoke
on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.8", "3.12"]
        exclude:
          - os: macos-latest
            python: "3.8"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python tests/smoke.py
